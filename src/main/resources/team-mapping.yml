# Mapping: The-Odds-API-Teamname  ->  kanonischer Name (football-data.org / DB).
# Nur nötig, wenn beide Quellen unterschiedlich schreiben. Schlüssel wird beim
# Laden case-insensitiv normalisiert; der Wert MUSS exakt dem DB-Namen entsprechen
# (matches.home/away), da die Zuordnung darüber per Gleichheit erfolgt.
#
# Nicht zugeordnete Odds-Events werden geloggt ("Odds ohne Zuordnung: …") — dort
# stehen die exakten Odds-API-Namen, falls hier ein Eintrag fehlt.
#
# WICHTIG: niemals "Congo" (Republik Kongo) auf "Congo DR" abbilden — das sind
# verschiedene Nationen.
teams:
  # Kap Verde
  "Cape Verde": "Cape Verde Islands"
  "Cabo Verde": "Cape Verde Islands"
  # DR Kongo
  "DR Congo": "Congo DR"
  "Democratic Republic of the Congo": "Congo DR"
  "Democratic Republic of Congo": "Congo DR"
  "Congo DR": "Congo DR"
