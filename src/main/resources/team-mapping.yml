# Alias-Map: The-Odds-API-Teamname -> football-data.org/DB-Name.
# NUR für echte WORT-Unterschiede nötig. Reine Schreibvarianten (Akzente,
# Bindestrich/&/Leerzeichen, Groß-Klein) werden vom Matching automatisch
# normalisiert (TeamNameMapping.normalizeForMatch) — dafür braucht es KEINEN
# Eintrag, z. B. "Bosnia & Herzegovina" ↔ "Bosnia-Herzegovina".
#
# Der Wert muss (nach Normalisierung) dem DB-Namen entsprechen. Verbleibende
# Abweichungen erscheinen im Log als "Odds ohne Zuordnung: …".
#
# WICHTIG: niemals "Congo" (Republik Kongo) auf "Congo DR" abbilden.
teams:
  # Aus dem Log bestätigte Wort-Unterschiede (Werte = vermutete DB-Schreibweise,
  # bitte per DB-Dump verifizieren — falscher Wert lässt das Paar nur weiter
  # unzugeordnet, bricht aber nichts Funktionierendes):
  "Czech Republic": "Czechia"
  "USA": "United States"
  # Zuvor von dir gemeldet:
  "Cape Verde": "Cape Verde Islands"
  "Cabo Verde": "Cape Verde Islands"
  "DR Congo": "Congo DR"
  "Democratic Republic of the Congo": "Congo DR"
