spring:
  application:
    name: wm-tippspiel
  # Mehrere @Scheduled-Jobs (Sync/Reveal/Eval/Board/Odds) sollen sich nicht
  # gegenseitig blockieren – eigener Thread-Pool statt des Single-Thread-Defaults.
  task:
    scheduling:
      pool:
        size: 4
  # Feature 008: Servlet-Web-Server (Tomcat) für die öffentliche Read-only-API.
  # WebClient (webflux) bleibt davon unberührt als reiner HTTP-Client.
  main:
    web-application-type: servlet
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/wmtippspiel}
    username: ${SPRING_DATASOURCE_USERNAME:wmtippspiel}
    password: ${SPRING_DATASOURCE_PASSWORD:wmtippspiel}
  # Schema kommt AUSSCHLIESSLICH von Liquibase (Verfassung Prinzip II) — kein JPA/ddl-auto.
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

server:
  port: ${SERVER_PORT:8080}
  # Hinter einem TLS-terminierenden Reverse-Proxy: X-Forwarded-*-Header auswerten,
  # damit erzeugte URLs (u. a. die OpenAPI-server-URL) das externe https/Host
  # widerspiegeln statt http://localhost:8080 (sonst Mixed-Content in Swagger-UI).
  forward-headers-strategy: framework

app:
  timezone-display: ${APP_TIMEZONE_DISPLAY:Europe/Berlin}
  public-api:
    # Erlaubte CORS-Origins (kommagetrennt), z. B. die Vercel-Domain (FR/R8).
    cors-allowed-origins: ${PUBLIC_API_CORS_ALLOWED_ORIGINS:}
    # HMAC-Secret für den öffentlichen Spieler-Identifier (PFLICHT, kein Default).
    id-secret: ${PUBLIC_API_ID_SECRET:}
    # Kurze Cache-TTL für Spielplan/Leaderboard (FR-021).
    cache-ttl-seconds: ${PUBLIC_API_CACHE_TTL_SECONDS:5}
    # Optional: explizite öffentliche Basis-URL für die OpenAPI-server-URL
    # (z. B. https://api.xenoria.de). Nur nötig, falls die X-Forwarded-Header
    # nicht greifen; leer = automatisch aus dem Request abgeleitet.
    public-base-url: ${PUBLIC_API_PUBLIC_BASE_URL:}
  website:
    # Basis-URL der öffentlichen Website (Feature 009), z. B. https://wm.xenoria.de.
    # Quelle für die Website-Hinweise/-Links in den Discord-Ausgaben (Board-Footer,
    # /profil, /rangliste). Leer ⇒ Hinweise/Links werden ausgelassen (kein Fehler).
    # Bewusst getrennt von app.public-api.public-base-url (das ist der API-Host).
    base-url: ${WEBSITE_BASE_URL:}
  scoring:
    # Rückwirkende Punkte-Neuberechnung beim App-Start (F-006/CHECK24-Umstellung).
    # Idempotent — kann nach erfolgter Migration auf false gesetzt werden.
    recalc-on-startup: ${SCORING_RECALC_ON_STARTUP:true}
  discord:
    token: ${DISCORD_TOKEN:}
    guild-id: ${DISCORD_GUILD_ID:}
    announce-channel-id: ${DISCORD_ANNOUNCE_CHANNEL_ID:}
    board-channel-id: ${DISCORD_BOARD_CHANNEL_ID:}
    info-channel-id: ${DISCORD_INFO_CHANNEL_ID:}
    tip-channel-id: ${DISCORD_TIP_CHANNEL_ID:}
    notify-role-id: ${DISCORD_NOTIFY_ROLE_ID:}
    # Eigener, für Mitglieder read-only Ranglisten-Channel (F11), getrennt vom Spielplan-Board.
    leaderboard-channel-id: ${DISCORD_LEADERBOARD_CHANNEL_ID:1517153509621895349}
  leaderboard:
    # Anzahl der im Leaderboard-Board angezeigten Top-Plätze (F11).
    top-n: ${LEADERBOARD_TOP_N:15}
  reminder:
    lead-minutes: ${REMINDER_LEAD_MINUTES:60}
  kickoff-notice:
    lead-minutes: ${KICKOFF_NOTICE_LEAD_MINUTES:10}
  presence:
    # Garantierter Mindestabstand zwischen Presence-Updates (F9). 5000 ms ⇒ ≤4
    # Änderungen/20 s, sichere Marge unter dem Discord-Limit (5/20 s).
    min-update-interval-ms: ${PRESENCE_MIN_UPDATE_INTERVAL_MS:5000}
    idle-text: ${PRESENCE_IDLE_TEXT:🏆 WM 2026 /tipp}
  football-data:
    base-url: ${FOOTBALL_DATA_BASE_URL:https://api.football-data.org/v4}
    api-key: ${FOOTBALL_DATA_API_KEY:}
  odds:
    enabled: ${ODDS_ENABLED:false}
    base-url: ${ODDS_BASE_URL:https://api.the-odds-api.com/v4}
    api-key: ${ODDS_API_KEY:}

# OpenAPI/Swagger (Feature 008) — nur die öffentlichen Endpoints dokumentieren.
springdoc:
  paths-to-match: /api/public/**
  swagger-ui:
    operations-sorter: alpha
    tags-sorter: alpha

logging:
  level:
    com.example.wmtippspiel: INFO
